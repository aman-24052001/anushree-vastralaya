<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#8B0038"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>अनुश्री वस्त्रालय</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700&family=Noto+Sans:wght@400;500;600;700&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;overflow-x:hidden}
:root{
  --maroon:#8B0038;--maroon2:#6D0029;--maroon-light:#F8E8EE;
  --gold:#B8860B;--gold2:#D4A017;--gold-light:#FDF6DC;
  --cream:#FFFDF7;--white:#FFFFFF;
  --text:#1A1A1A;--muted:#777;--border:#E8D9C4;
  --green:#1B6B3A;--green-light:#E6F4EC;
  --red:#B71C1C;--red-light:#FDECEA;
  --blue:#1565C0;--blue-light:#E3F2FD;
  --shadow:0 2px 14px rgba(139,0,56,0.08);
}
body{background:var(--cream);font-family:'Noto Sans',sans-serif;color:var(--text);min-height:100vh;max-width:430px;margin:0 auto}
button{font-family:'Noto Sans',sans-serif;cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:'Noto Sans',sans-serif;outline:none}

/* TOPBAR */
.topbar{background:var(--maroon);padding:0 14px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:3px solid var(--gold)}
.tb-left{display:flex;align-items:center;gap:10px}
.tb-logo{width:38px;height:38px;border-radius:50%;border:2px solid var(--gold);object-fit:cover;flex-shrink:0}
.tb-title{font-family:'Noto Sans Devanagari',sans-serif;font-size:15px;font-weight:700;color:white;line-height:1.15}
.tb-sub{font-size:9px;color:rgba(212,160,23,0.85);letter-spacing:1px;text-transform:uppercase;font-weight:600}
.lang-btn{background:rgba(212,160,23,0.18);color:var(--gold2);border:1.5px solid rgba(212,160,23,0.4);padding:5px 10px;font-size:11px;font-weight:700;letter-spacing:1px;border-radius:4px}

/* PAGES */
.page{display:none;padding:12px 13px 80px;min-height:calc(100vh - 58px)}
.page.active{display:block}

/* BOTTOM NAV — 4 tabs */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--white);border-top:3px solid var(--maroon);display:flex;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:7px 2px 9px;gap:2px;background:none;color:var(--muted);font-size:9px;font-weight:700;letter-spacing:0.3px;border-right:1px solid #f0e8e8;transition:background .15s,color .15s}
.nav-btn:last-child{border-right:none}
.nav-btn.active{background:var(--maroon-light);color:var(--maroon)}
.nav-btn .ni{font-size:19px;line-height:1}

/* STAT CARDS */
.stat-hero{background:var(--maroon);border-radius:12px;padding:16px 18px;margin-bottom:10px;position:relative;overflow:hidden}
.stat-hero::after{content:'₹';position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:64px;font-weight:900;color:rgba(255,255,255,0.05);font-family:'Roboto Mono',monospace;line-height:1}
.sh-label{font-size:10px;color:rgba(255,255,255,0.6);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.sh-val{font-family:'Roboto Mono',monospace;font-size:34px;font-weight:700;color:white;line-height:1}
.sh-sub{font-size:11px;color:rgba(255,255,255,0.5);margin-top:3px}
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px}
.stat-mini{background:var(--white);border-radius:10px;padding:12px 14px;box-shadow:var(--shadow);border-left:3px solid var(--gold)}
.stat-mini.g{border-left-color:var(--green)}
.sm-label{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:3px}
.sm-val{font-family:'Roboto Mono',monospace;font-size:17px;font-weight:700;color:var(--text)}
.sm-val.gold{color:var(--gold)}
.sm-val.green{color:var(--green)}

/* CHART */
.chart-box{background:var(--white);border-radius:12px;padding:14px;box-shadow:var(--shadow);margin-bottom:10px}
.chart-title{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.chart-wrap{display:flex;align-items:flex-end;gap:4px;height:84px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%}
.bar-inner{flex:1;display:flex;align-items:flex-end;width:100%}
.bar{width:100%;border-radius:3px 3px 0 0;position:relative;min-height:3px;background:var(--maroon-light);transition:height .4s}
.bar.now{background:var(--maroon)}
.bar-v{font-size:7px;font-family:'Roboto Mono',monospace;color:var(--maroon);font-weight:700;position:absolute;top:-13px;left:50%;transform:translateX(-50%);white-space:nowrap}
.bar-l{font-size:8px;color:var(--muted);font-weight:600}

/* PIE */
.pie-box{background:var(--white);border-radius:12px;padding:14px;box-shadow:var(--shadow);margin-bottom:10px}
.pie-title{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:12px}
.pie-wrap{display:flex;align-items:center;gap:14px}
.pie-legend-item{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.pie-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.pie-lbl{font-size:12px;color:var(--text);font-weight:600;flex:1}
.pie-v{font-family:'Roboto Mono',monospace;font-size:12px;color:var(--muted)}

/* SECTION */
.sec-head{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin:12px 0 7px}

/* CUSTOMER CARDS */
.cust-card{background:var(--white);border-radius:12px;padding:12px 13px;margin-bottom:8px;box-shadow:var(--shadow);display:flex;align-items:center;gap:11px;border-left:3px solid transparent;cursor:pointer}
.cust-card.red{border-left-color:var(--red)}
.cust-card.grn{border-left-color:var(--green)}
.avatar{width:44px;height:44px;border-radius:50%;border:2px solid var(--gold);background:var(--maroon-light);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:var(--maroon);overflow:hidden;flex-shrink:0}
.avatar img{width:100%;height:100%;object-fit:cover}
.ci{flex:1;min-width:0}
.ci-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-bal{font-family:'Roboto Mono',monospace;font-size:12px;font-weight:700;margin-top:1px}
.ci-bal.red{color:var(--red)}
.ci-bal.grn{color:var(--green)}
.ci-phone{font-size:10px;color:var(--muted);margin-top:1px}
.call-btn{background:var(--green);color:white;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;box-shadow:0 2px 8px rgba(27,107,58,0.4);text-decoration:none;transition:transform .15s}
.call-btn:active{transform:scale(0.88)}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:11px}
.search-in{width:100%;padding:11px 13px 11px 38px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;background:var(--white);color:var(--text)}
.search-in:focus{border-color:var(--maroon)}
.si{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}

/* ADD CUSTOMER ROW */
.ac-row{display:flex;gap:7px;margin-bottom:11px}
.ac-row input{flex:1;padding:10px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;background:var(--white);min-width:0}
.ac-row input:focus{border-color:var(--maroon)}
.ac-add{background:var(--maroon);color:white;padding:10px 13px;border-radius:8px;font-size:12px;font-weight:700;white-space:nowrap;flex-shrink:0}

/* FORMS */
.form-card{background:var(--white);border-radius:12px;padding:15px;box-shadow:var(--shadow);margin-bottom:10px}
.f-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;display:block;margin-bottom:5px}
.f-in{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;color:var(--text);background:var(--cream);margin-bottom:12px;display:block}
.f-in:focus{border-color:var(--maroon);background:var(--white)}
.f-in.big{font-family:'Roboto Mono',monospace;font-size:26px;font-weight:700;color:var(--maroon);text-align:center;padding:13px}
.photo-btn{width:100%;padding:13px;border:2px dashed var(--border);border-radius:10px;background:var(--cream);color:var(--maroon);font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:12px}
.photo-prev{width:100%;height:140px;object-fit:cover;border-radius:10px;margin-bottom:12px;display:none}
.save-btn{width:100%;padding:14px;background:var(--maroon);color:white;border-radius:10px;font-size:15px;font-weight:700;box-shadow:0 4px 14px rgba(139,0,56,0.28);transition:transform .15s}
.save-btn:active{transform:scale(0.97)}
.save-btn.blue-btn{background:var(--blue);box-shadow:0 4px 14px rgba(21,101,192,0.25)}

/* DROPDOWN */
.drop{background:var(--white);border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,0.12);margin-bottom:11px;overflow:hidden;border:1.5px solid var(--border);max-height:210px;overflow-y:auto;display:none}
.drop.open{display:block}
.drop-item{padding:11px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;cursor:pointer;font-size:13px;font-weight:600}
.drop-item:last-child{border-bottom:none}
.drop-item:active{background:var(--maroon-light)}
.d-av{width:28px;height:28px;border-radius:50%;background:var(--maroon-light);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--maroon);overflow:hidden;flex-shrink:0}
.d-av img{width:100%;height:100%;object-fit:cover}
.d-ph{color:var(--muted);font-size:10px;margin-left:auto}

/* OVERLAY (customer detail) */
.overlay{position:fixed;inset:0;background:var(--white);z-index:200;transform:translateX(100%);transition:transform .25s ease;overflow-y:auto;overflow-x:hidden;max-width:430px;left:50%;margin-left:-215px}
.overlay.open{transform:translateX(0)}
@media(max-width:430px){.overlay{left:0;margin-left:0;max-width:100%}}
.ov-head{background:var(--maroon);padding:13px 14px;display:flex;align-items:center;gap:11px;position:sticky;top:0;z-index:10;border-bottom:3px solid var(--gold)}
.back-btn{background:rgba(255,255,255,0.15);color:white;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.ov-name{font-size:16px;font-weight:700;color:white;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ov-call{background:var(--green);color:white;padding:6px 13px;border-radius:20px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:4px;text-decoration:none;flex-shrink:0}
.ov-body{padding:13px 13px 80px}

/* BALANCE HERO */
.bal-hero{border-radius:12px;padding:16px 18px;margin-bottom:12px;text-align:center}
.bal-hero.owing{background:var(--red-light)}
.bal-hero.clear{background:var(--green-light)}
.bh-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.bh-amount{font-family:'Roboto Mono',monospace;font-size:30px;font-weight:700}
.bh-amount.owing{color:var(--red)}
.bh-amount.clear{color:var(--green);font-size:20px}

/* QUICK PAY */
.pay-bar{background:var(--gold-light);border:1.5px solid var(--gold2);border-radius:10px;padding:11px 13px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.pay-bar input{flex:1;background:var(--white);border:1.5px solid var(--border);border-radius:7px;padding:9px 11px;font-size:15px;font-family:'Roboto Mono',monospace;font-weight:700;color:var(--text);min-width:0}
.pay-bar input:focus{border-color:var(--green)}
.pay-bar button{background:var(--green);color:white;padding:9px 14px;border-radius:7px;font-size:12px;font-weight:700;white-space:nowrap}

/* EDIT CUSTOMER BAR */
.edit-cust-bar{background:var(--blue-light);border:1.5px solid #90CAF9;border-radius:10px;padding:11px 13px;margin-bottom:12px;display:flex;gap:7px;align-items:center}
.edit-cust-bar input{flex:1;background:var(--white);border:1.5px solid var(--border);border-radius:7px;padding:8px 10px;font-size:13px;min-width:0}
.edit-cust-bar .ec-save{background:var(--blue);color:white;padding:8px 12px;border-radius:7px;font-size:12px;font-weight:700;white-space:nowrap}
.edit-cust-bar .ec-del{background:var(--red);color:white;padding:8px 12px;border-radius:7px;font-size:12px;font-weight:700;white-space:nowrap}

/* TRANSACTIONS */
.txn{background:var(--white);border-radius:10px;padding:12px 13px;margin-bottom:7px;box-shadow:0 1px 6px rgba(0,0,0,0.05)}
.txn-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.txn-tag{font-size:9px;font-weight:700;letter-spacing:0.5px;padding:3px 8px;border-radius:20px}
.txn-tag.sale{background:var(--red-light);color:var(--red)}
.txn-tag.payment{background:var(--green-light);color:var(--green)}
.txn-amt{font-family:'Roboto Mono',monospace;font-size:15px;font-weight:700}
.txn-amt.sale{color:var(--red)}
.txn-amt.payment{color:var(--green)}
.txn-desc{font-size:12px;color:var(--text);margin-bottom:2px}
.txn-date{font-size:10px;color:var(--muted)}
.txn-img{width:100%;max-height:120px;object-fit:cover;border-radius:7px;margin-top:7px;cursor:pointer}
.txn-actions{display:flex;gap:6px;margin-top:7px;padding-top:7px;border-top:1px solid var(--border)}
.txn-edit{background:var(--blue-light);color:var(--blue);border:none;padding:5px 11px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer}
.txn-del{background:var(--red-light);color:var(--red);border:none;padding:5px 11px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer}
.txn-del.confirming{background:var(--red);color:white}

/* EDIT TXN MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:300;display:none;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal-box{background:var(--white);border-radius:16px 16px 0 0;padding:20px 16px 32px;width:100%;max-width:430px;max-height:80vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:var(--maroon-light);color:var(--maroon);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer}

/* PHOTO VIEWER */
.pv{position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:500;display:none;align-items:center;justify-content:center}
.pv.open{display:flex}
.pv img{max-width:96%;max-height:88vh;border-radius:8px}
.pv-close{position:absolute;top:13px;right:13px;color:white;font-size:22px;background:rgba(255,255,255,0.15);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer}

/* TOAST */
.toast{position:fixed;bottom:74px;left:50%;transform:translateX(-50%);background:var(--text);color:white;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;border-left:3px solid var(--gold2)}
.toast.show{opacity:1}

/* EMPTY */
.empty{text-align:center;padding:36px 16px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:9px}
.empty-text{font-size:14px;font-weight:700;color:var(--text);margin-bottom:3px}
.empty-sub{font-size:12px}

/* CONFIRM STRIP */
.confirm-strip{background:var(--red-light);border:1.5px solid var(--red);border-radius:8px;padding:10px 13px;margin-bottom:10px;display:none;align-items:center;justify-content:space-between;gap:8px}
.confirm-strip.show{display:flex}
.confirm-strip span{font-size:13px;font-weight:600;color:var(--red)}
.confirm-yes{background:var(--red);color:white;padding:7px 14px;border-radius:6px;font-size:12px;font-weight:700}
.confirm-no{background:var(--white);color:var(--muted);border:1px solid var(--border);padding:7px 14px;border-radius:6px;font-size:12px;font-weight:700}
</style>
</head>

<!-- PAGE: CUSTOMERS -->
<div class="page" id="page-customers">
  <div class="ac-row">
    <input id="nc-name" type="text" placeholder="नाम"/>
    <input id="nc-phone" type="tel" placeholder="फोन"/>
    <button class="ac-add" id="ac-add-btn" onclick="addCustomer()">+ जोड़ें</button>
  </div>
  <div class="search-wrap">
    <span class="si">🔍</span>
    <input class="search-in" id="search" type="text" oninput="renderCustomers()" placeholder="खोजें..."/>
  </div>
  <div id="cust-list"></div>
</div>

<!-- PAGE: ADD SALE -->
<div class="page" id="page-add">
  <div class="form-card">
    <label class="f-label" id="lbl-sel-cust">ग्राहक चुनें</label>
    <input class="f-in" id="sc-input" type="text" placeholder="नाम लिखें..." autocomplete="off" oninput="filterDrop()" onfocus="openDrop()"/>
    <input type="hidden" id="sc-id"/>
    <div class="drop" id="drop"></div>

    <label class="f-label" id="lbl-amt">राशि (₹)</label>
    <input class="f-in big" id="s-amt" type="number" inputmode="decimal" placeholder="0"/>

    <label class="f-label" id="lbl-desc">विवरण (वैकल्पिक)</label>
    <input class="f-in" id="s-desc" type="text" placeholder="जैसे: लाल बनारसी साड़ी"/>

    <label class="f-label" id="lbl-ph">फ़ोटो (वैकल्पिक)</label>
    <input type="file" id="ph-file" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(event,'ph-prev')"/>
    <button class="photo-btn" onclick="document.getElementById('ph-file').click()">📷 <span id="lbl-take">फ़ोटो लें</span></button>
    <img class="photo-prev" id="ph-prev"/>

    <button class="save-btn" id="save-sale-btn" onclick="saveSale()">बिक्री दर्ज करें</button>
  </div>
</div>

<!-- PAGE: ADD PAYMENT -->
<div class="page" id="page-pay">
  <div class="form-card">
    <label class="f-label" id="lbl-pay-cust">ग्राहक चुनें</label>
    <input class="f-in" id="pc-input" type="text" placeholder="नाम लिखें..." autocomplete="off" oninput="filterPayDrop()" onfocus="openPayDrop()"/>
    <input type="hidden" id="pc-id"/>
    <div class="drop" id="pay-drop"></div>

    <!-- Show current balance after selection -->
    <div id="pay-bal-strip" style="display:none;background:var(--red-light);border-radius:8px;padding:10px 13px;margin-bottom:12px;font-size:13px;font-weight:700;color:var(--red)"></div>

    <label class="f-label" id="lbl-pay-amt">भुगतान राशि (₹)</label>
    <input class="f-in big" id="p-amt" type="number" inputmode="decimal" placeholder="0"/>

    <label class="f-label" id="lbl-pay-note">नोट (वैकल्पिक)</label>
    <input class="f-in" id="p-note" type="text" placeholder="जैसे: कैश मिला"/>

    <button class="save-btn blue-btn" id="save-pay-btn" onclick="savePayment()">✓ भुगतान दर्ज करें</button>
  </div>
</div>

// ── INDEXEDDB ────────────────────────────────────────────────────────────────
let db, customers=[], transactions=[], curTab='home', curCustId=null, editPhotoData=null, salePhotoData=null;

function initDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open('anushreeVastralaya',1);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('customers')) d.createObjectStore('customers',{keyPath:'id'});
      if(!d.objectStoreNames.contains('transactions')) d.createObjectStore('transactions',{keyPath:'id'});
    };
    r.onsuccess=e=>{ db=e.target.result; res(); };
    r.onerror=()=>rej(r.error);
  });
}
const dbAll=s=>new Promise(res=>{ const r=db.transaction(s,'readonly').objectStore(s).getAll(); r.onsuccess=()=>res(r.result||[]); });
const dbPut=(s,o)=>new Promise(res=>{ const tx=db.transaction(s,'readwrite'); tx.objectStore(s).put(o); tx.oncomplete=res; });
const dbDel=(s,id)=>new Promise(res=>{ const tx=db.transaction(s,'readwrite'); tx.objectStore(s).delete(id); tx.oncomplete=res; });

// ── HELPERS ──────────────────────────────────────────────────────────────────
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const fmt=n=>'₹'+Number(n||0).toLocaleString('en-IN');
const fmtDate=iso=>{ const d=new Date(iso); return d.getDate()+' '+t('months')[d.getMonth()]+' '+d.getFullYear(); };
const toISO=d=>d?new Date(d).toISOString():new Date().toISOString();
const initial=n=>n?n.charAt(0).toUpperCase():'?';
const bal=id=>transactions.filter(x=>x.customerId===id).reduce((s,x)=>x.type==='sale'?s+x.amount:s-x.amount,0);
const toast=(msg,dur=2000)=>{ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),dur); };
const loadData=async()=>{ customers=await dbAll('customers'); transactions=await dbAll('transactions'); };

function handlePhoto(e, prevId){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const max=800; let w=img.width,h=img.height;
      if(w>max){h=Math.round(h*max/w);w=max;}
      if(h>max){w=Math.round(w*max/h);h=max;}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const data=canvas.toDataURL('image/jpeg',0.72);
      if(prevId==='ph-prev') salePhotoData=data;
      if(prevId==='e-ph-prev') editPhotoData=data;
      const prev=document.getElementById(prevId);
      prev.src=data; prev.style.display='block';
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

function goTo(tab){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  document.getElementById('nav-'+tab).classList.add('active');
  curTab=tab;
  if(tab==='home') renderHome();
  if(tab==='customers') renderCustomers();
  if(tab==='add'){ resetSaleForm(); buildDrop('sc-input','sc-id','drop',pickSaleCust); }
  if(tab==='pay'){ resetPayForm(); buildPayDrop(); }
}

// ── HOME ────────────────────────────────────────────────────────────────────
function renderHome(){
  const now=new Date(),m=now.getMonth(),y=now.getFullYear();
  const totalDue=customers.reduce((s,c)=>s+Math.max(0,bal(c.id)),0);
  const mTx=transactions.filter(tx=>{ const d=new Date(tx.date); return d.getMonth()===m&&d.getFullYear()===y; });
  const mSale=mTx.filter(x=>x.type==='sale').reduce((s,x)=>s+x.amount,0);
  const mPaid=mTx.filter(x=>x.type==='payment').reduce((s,x)=>s+x.amount,0);
  const allSales=transactions.filter(x=>x.type==='sale').reduce((s,x)=>s+x.amount,0);

  // Bar — 6 months
  const bars=[];
  for(let i=5;i>=0;i--){
    const d=new Date(y,m-i,1),bm=d.getMonth(),by=d.getFullYear();
    const v=transactions.filter(x=>{ const dd=new Date(x.date); return x.type==='sale'&&dd.getMonth()===bm&&dd.getFullYear()===by; }).reduce((s,x)=>s+x.amount,0);
    bars.push({label:t('months')[bm],v,now:i===0});
  }
  const maxB=Math.max(...bars.map(b=>b.v),1);

  // Pie
  const pC=mPaid, pO=Math.max(0,mSale-mPaid), pT=pC+pO||1;
  const pct=Math.round(pC/pT*100);
  const pol=(cx,cy,r,deg)=>{ const rad=(deg-90)*Math.PI/180; return {x:cx+r*Math.cos(rad),y:cy+r*Math.sin(rad)}; };
  const slice=(cx,cy,r,s,e,col)=>{ if(e-s>=360) return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${col}"/>`; const a=pol(cx,cy,r,s),b=pol(cx,cy,r,e),lg=e-s>180?1:0; return `<path d="M${cx},${cy} L${a.x},${a.y} A${r},${r} 0 ${lg},1 ${b.x},${b.y} Z" fill="${col}"/>`; };

  const debtors=customers.map(c=>({...c,b:bal(c.id)})).filter(c=>c.b>0).sort((a,z)=>z.b-a.b).slice(0,3);
  const recent=[...transactions].filter(x=>x.type==='sale').sort((a,z)=>new Date(z.date)-new Date(a.date)).slice(0,4);

  document.getElementById('home-content').innerHTML=`
    <div class="stat-hero">
      <div class="sh-label">${t('totalDue')}</div>
      <div class="sh-val">${fmt(totalDue)}</div>
      <div class="sh-sub">${t('subDue')}</div>
    </div>
    <div class="stats-row">
      <div class="stat-mini"><div class="sm-label">${t('monthSale')}</div><div class="sm-val gold">${fmt(mSale)}</div></div>
      <div class="stat-mini g"><div class="sm-label">${t('allTime')}</div><div class="sm-val green">${fmt(allSales)}</div></div>
    </div>

    <div class="chart-box">
      <div class="chart-title"><span>${t('chartTitle')}</span><span style="color:var(--maroon);font-family:'Roboto Mono',monospace;font-size:11px">${fmt(mSale)}</span></div>
      ${bars.every(b=>b.v===0)?
        `<div style="text-align:center;padding:20px;color:var(--muted);font-size:12px">${t('noSales')}</div>`:`
      <div class="chart-wrap">
        ${bars.map(b=>`<div class="bar-col"><div class="bar-inner"><div class="bar ${b.now?'now':''}" style="height:${Math.max(3,b.v/maxB*80)}px">${b.v>0?`<span class="bar-v">${b.v>=1000?(b.v/1000).toFixed(0)+'k':b.v}</span>`:''}</div></div><div class="bar-l">${b.label}</div></div>`).join('')}
      </div>`}
    </div>

    ${mSale>0?`
    <div class="pie-box">
      <div class="pie-title">${t('pieTitle')}</div>
      <div class="pie-wrap">
        <svg width="80" height="80" viewBox="0 0 80 80">
          <circle cx="40" cy="40" r="36" fill="#eee"/>
          ${slice(40,40,36,0,pct*3.6,'#1B6B3A')}
          ${pct<100?slice(40,40,36,pct*3.6,360,'#B71C1C'):''}
          <circle cx="40" cy="40" r="22" fill="white"/>
          <text x="40" y="44" text-anchor="middle" font-size="11" font-weight="700" font-family="Roboto Mono,monospace" fill="#1A1A1A">${pct}%</text>
        </svg>
        <div style="flex:1">
          <div class="pie-legend-item"><div class="pie-dot" style="background:var(--green)"></div><div class="pie-lbl">${t('collected')}</div><div class="pie-v">${fmt(pC)}</div></div>
          <div class="pie-legend-item"><div class="pie-dot" style="background:var(--red)"></div><div class="pie-lbl">${t('owing')}</div><div class="pie-v">${fmt(pO)}</div></div>
        </div>
      </div>
    </div>`:''}

    ${debtors.length>0?`<div class="sec-head">${t('topDebtors')}</div>
    ${debtors.map(c=>`<div class="cust-card red" onclick="openDetail('${c.id}')"><div class="avatar">${c.photo?`<img src="${c.photo}"/>`:initial(c.name)}</div><div class="ci"><div class="ci-name">${c.name}</div><div class="ci-bal red">${fmt(c.b)}</div><div class="ci-phone">${c.phone}</div></div><a class="call-btn" href="tel:${c.phone}" onclick="event.stopPropagation()">📞</a></div>`).join('')}`:''}

    ${recent.length>0?`<div class="sec-head">${t('recentSales')}</div>
    ${recent.map(tx=>{ const c=customers.find(x=>x.id===tx.customerId); return `<div class="txn" onclick="c&&openDetail('${tx.customerId}')"><div class="txn-top"><span style="font-size:12px;font-weight:700">${c?c.name:'—'}</span><span class="txn-amt sale">${fmt(tx.amount)}</span></div>${tx.desc?`<div class="txn-desc">${tx.desc}</div>`:''}<div class="txn-date">${fmtDate(tx.date)}</div>${tx.photo?`<img class="txn-img" src="${tx.photo}" onclick="event.stopPropagation();openPV('${tx.photo}')"/>`:''}</div>`; }).join('')}`:''}
  `;
}

async function addCustomer(){
  const name=document.getElementById('nc-name').value.trim();
  const phone=document.getElementById('nc-phone').value.trim();
  if(!name||!phone){ toast(t('t_fillCust')); return; }
  const c={id:uid(),name,phone,photo:null,createdAt:new Date().toISOString()};
  await dbPut('customers',c); customers.push(c);
  document.getElementById('nc-name').value='';
  document.getElementById('nc-phone').value='';
  toast(t('t_custAdd')); renderCustomers();
}

function renderCustomers(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  const list=customers.filter(c=>c.name.toLowerCase().includes(q)||c.phone.includes(q))
    .map(c=>({...c,b:bal(c.id)})).sort((a,z)=>z.b-a.b);
  if(!list.length){
    document.getElementById('cust-list').innerHTML=`<div class="empty"><div class="empty-icon">🪷</div><div class="empty-text">${t('noCustomers')}</div><div class="empty-sub">${t('noCustomersSub')}</div></div>`;
    return;
  }
  document.getElementById('cust-list').innerHTML=list.map(c=>`
    <div class="cust-card ${c.b>0?'red':'grn'}" onclick="openDetail('${c.id}')">
      <div class="avatar">${c.photo?`<img src="${c.photo}"/>`:initial(c.name)}</div>
      <div class="ci">
        <div class="ci-name">${c.name}</div>
        <div class="ci-bal ${c.b>0?'red':'grn'}">${c.b>0?fmt(c.b)+' '+t('owing'):t('allClear')}</div>
        <div class="ci-phone">${c.phone}</div>
      </div>
      <a class="call-btn" href="tel:${c.phone}" onclick="event.stopPropagation()">📞</a>
    </div>`).join('');
}

// ── DROPDOWN (generic) ──────────────────────────────────────────────────────
function buildDrop(inputId,hiddenId,dropId,onPick){
  const q=(document.getElementById(inputId).value||'').toLowerCase();
  const list=customers.filter(c=>!q||c.name.toLowerCase().includes(q)||c.phone.includes(q));
  const dd=document.getElementById(dropId);
  if(!list.length){ dd.classList.remove('open'); return; }
  dd.innerHTML=list.map(c=>`<div class="drop-item" onclick="(${onPick.toString()})('${c.id}','${c.name.replace(/'/g,"\\'")}','${dropId}','${inputId}','${hiddenId}')"><div class="d-av">${c.photo?`<img src="${c.photo}"/>`:initial(c.name)}</div>${c.name}<span class="d-ph">${c.phone}</span></div>`).join('');
  dd.classList.add('open');
}
function pickSaleCust(id,name,dropId,inputId,hiddenId){
  document.getElementById(hiddenId).value=id;
  document.getElementById(inputId).value=name;
  document.getElementById(dropId).classList.remove('open');
}
function filterDrop(){ document.getElementById('sc-id').value=''; buildDrop('sc-input','sc-id','drop',pickSaleCust); }
function openDrop(){ buildDrop('sc-input','sc-id','drop',pickSaleCust); }

function buildPayDrop(){
  const q=(document.getElementById('pc-input').value||'').toLowerCase();
  const list=customers.filter(c=>!q||c.name.toLowerCase().includes(q)||c.phone.includes(q));
  const dd=document.getElementById('pay-drop');
  if(!list.length){ dd.classList.remove('open'); return; }
  dd.innerHTML=list.map(c=>`<div class="drop-item" onclick="pickPayCust('${c.id}','${c.name.replace(/'/g,"\\'")}')"><div class="d-av">${c.photo?`<img src="${c.photo}"/>`:initial(c.name)}</div>${c.name}<span class="d-ph">${c.phone}</span></div>`).join('');
  dd.classList.add('open');
}
function pickPayCust(id,name){
  document.getElementById('pc-id').value=id;
  document.getElementById('pc-input').value=name;
  document.getElementById('pay-drop').classList.remove('open');
  const b=bal(id);
  const strip=document.getElementById('pay-bal-strip');
  if(b>0){ strip.textContent=t('curBal')+': '+fmt(b); strip.style.display='block'; }
  else { strip.style.display='none'; }
}
function filterPayDrop(){ document.getElementById('pc-id').value=''; buildPayDrop(); }
function openPayDrop(){ buildPayDrop(); }

document.addEventListener('click',e=>{

});

function openDetail(id){
  curCustId=id;
  const c=customers.find(x=>x.id===id); if(!c) return;
  document.getElementById('ov-name').textContent=c.name;
  document.getElementById('ov-call').href='tel:'+c.phone;
  renderDetail();
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeOverlay(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
  curCustId=null;
  loadData().then(renderAll);
}

async function quickPay(){
  const amt=parseFloat(document.getElementById('qp-input').value);
  if(!amt||amt<=0) return;
  const tx={id:uid(),customerId:curCustId,type:'payment',amount:amt,desc:'',photo:null,date:new Date().toISOString()};
  await dbPut('transactions',tx); transactions.push(tx);
  document.getElementById('qp-input').value='';
  toast(t('t_pay')); renderDetail();
}

// EDIT CUSTOMER
let editCustMode=false;
function toggleEditCust(){
  const c=customers.find(x=>x.id===curCustId); if(!c) return;
  editCustMode=!editCustMode; renderDetail();
}
async function saveEditCust(){
  const name=document.getElementById('ec-name').value.trim();
  const phone=document.getElementById('ec-phone').value.trim();
  if(!name||!phone){ toast(t('t_fillCust')); return; }
  const c=customers.find(x=>x.id===curCustId); if(!c) return;
  c.name=name; c.phone=phone;
  await dbPut('customers',c);
  document.getElementById('ov-name').textContent=name;
  document.getElementById('ov-call').href='tel:'+phone;
  toast(t('t_custEdit')); editCustMode=false; renderDetail();
}
let delCustConfirm=false;
function startDelCust(){ delCustConfirm=true; renderDetail(); }
function cancelDelCust(){ delCustConfirm=false; renderDetail(); }
async function confirmDelCust(){
  // delete all txns for this customer
  const txToRemove=transactions.filter(x=>x.customerId===curCustId);
  for(const tx of txToRemove) await dbDel('transactions',tx.id);
  await dbDel('customers',curCustId);
  customers=customers.filter(x=>x.id!==curCustId);
  transactions=transactions.filter(x=>x.customerId!==curCustId);
  toast(t('custDeleted')); closeOverlay();
}

// EDIT / DELETE TRANSACTION
let deletingTxnId=null;
function startDeleteTxn(id){ deletingTxnId=id; renderDetail(); }
function cancelDeleteTxn(){ deletingTxnId=null; renderDetail(); }
async function confirmDeleteTxn(){
  if(!deletingTxnId) return;
  await dbDel('transactions',deletingTxnId);
  transactions=transactions.filter(x=>x.id!==deletingTxnId);
  deletingTxnId=null; toast(t('t_txnDel')); renderDetail();
}

function openEditModal(id){
  const tx=transactions.find(x=>x.id===id); if(!tx) return;
  document.getElementById('edit-txn-id').value=id;
  document.getElementById('e-amt').value=tx.amount;
  document.getElementById('e-desc').value=tx.desc||'';
  document.getElementById('e-date').value=tx.date.split('T')[0];
  document.getElementById('e-ph-prev').style.display='none';
  document.getElementById('e-ph-file').value='';
  editPhotoData=null;
  document.getElementById('edit-modal').classList.add('open');
}
function closeEditModal(){
  document.getElementById('edit-modal').classList.remove('open');
  editPhotoData=null;
}
async function saveEdit(){
  const id=document.getElementById('edit-txn-id').value;
  const tx=transactions.find(x=>x.id===id); if(!tx) return;
  const amt=parseFloat(document.getElementById('e-amt').value);
  const desc=document.getElementById('e-desc').value.trim();
  const date=document.getElementById('e-date').value;
  if(!amt||amt<=0) return;
  tx.amount=amt; tx.desc=desc; tx.date=toISO(date);
  if(editPhotoData) tx.photo=editPhotoData;
  await dbPut('transactions',tx);
  toast(t('t_txnEdit')); closeEditModal(); renderDetail();
}

function renderDetail(){
  const id=curCustId;
  const c=customers.find(x=>x.id===id); if(!c) return;
  const txns=[...transactions].filter(x=>x.customerId===id).sort((a,z)=>new Date(z.date)-new Date(a.date));
  const b=bal(id); const clear=b<=0;

  document.getElementById('ov-body').innerHTML=`
    <!-- BALANCE -->
    <div class="bal-hero ${clear?'clear':'owing'}">
      <div class="bh-label">${clear?'':t('balance')}</div>
      <div class="bh-amount ${clear?'clear':'owing'}">${clear?t('allClear'):fmt(b)}</div>
    </div>

    <!-- QUICK PAY -->
    ${!clear?`<div class="pay-bar"><input id="qp-input" type="number" inputmode="decimal" placeholder="${t('payAmt')}"/><button onclick="quickPay()">✓ ${t('addPay')}</button></div>`:''}

    <!-- EDIT CUSTOMER -->
    <div style="margin-bottom:10px">
      <button onclick="toggleEditCust()" style="background:var(--blue-light);color:var(--blue);border:none;padding:7px 13px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer">✏️ ${t('editCust')}</button>
    </div>

    ${editCustMode?`
    <div class="edit-cust-bar" style="flex-wrap:wrap;gap:7px">
      <input id="ec-name" type="text" value="${c.name}" style="flex:1;min-width:100px"/>
      <input id="ec-phone" type="tel" value="${c.phone}" style="flex:1;min-width:100px"/>
      <button class="ec-save" onclick="saveEditCust()">✓ सेव</button>
      <button class="ec-del" onclick="startDelCust()">🗑 हटाएँ</button>
    </div>`:''}

    ${delCustConfirm?`
    <div style="background:var(--red-light);border:1.5px solid var(--red);border-radius:8px;padding:12px;margin-bottom:10px;text-align:center">
      <div style="font-size:13px;font-weight:700;color:var(--red);margin-bottom:10px">${t('delCust')}</div>
      <div style="display:flex;gap:8px;justify-content:center">
        <button onclick="confirmDelCust()" style="background:var(--red);color:white;border:none;padding:8px 16px;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer">${t('delCustSure')}</button>
        <button onclick="cancelDelCust()" style="background:var(--white);border:1px solid var(--border);padding:8px 16px;border-radius:7px;font-size:13px;cursor:pointer">${t('cancel')}</button>
      </div>
    </div>`:''}

    <!-- TRANSACTIONS -->
    ${deletingTxnId?`
    <div style="background:var(--red-light);border:1.5px solid var(--red);border-radius:8px;padding:11px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:8px">
      <span style="font-size:12px;font-weight:700;color:var(--red)">क्या यह एंट्री हटाएँ?</span>
      <div style="display:flex;gap:6px">
        <button onclick="confirmDeleteTxn()" style="background:var(--red);color:white;border:none;padding:6px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer">${t('delCustSure')}</button>
        <button onclick="cancelDeleteTxn()" style="background:var(--white);border:1px solid var(--border);padding:6px 10px;border-radius:6px;font-size:11px;cursor:pointer">${t('cancel')}</button>
      </div>
    </div>`:''}

    ${txns.length===0?
      `<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">${t('noTxn')}</div></div>`:
      txns.map(tx=>`
        <div class="txn">
          <div class="txn-top">
            <span class="txn-tag ${tx.type}">${tx.type==='sale'?t('sale'):t('payment')}</span>
            <span class="txn-amt ${tx.type}">${tx.type==='sale'?'+':'-'}${fmt(tx.amount)}</span>
          </div>
          ${tx.desc?`<div class="txn-desc">${tx.desc}</div>`:''}
          <div class="txn-date">${fmtDate(tx.date)}</div>
          ${tx.photo?`<img class="txn-img" src="${tx.photo}" onclick="openPV('${tx.photo}')"/>`:''}
          <div class="txn-actions">
            <button class="txn-edit" onclick="openEditModal('${tx.id}')">✏️ सुधारें</button>
            <button class="txn-del ${deletingTxnId===tx.id?'confirming':''}" onclick="startDeleteTxn('${tx.id}')">🗑 हटाएँ</button>
          </div>
        </div>`).join('')
    }
  `;
}

// ── PHOTO VIEWER ──────────────────────────────────────────────────────────
function openPV(src){ document.getElementById('pv-img').src=src; document.getElementById('pv').classList.add('open'); }
function closePV(){ document.getElementById('pv').classList.remove('open'); }

// ── BOOT ─────────────────────────────────────────────────────────────────
initDB().then(loadData).then(()=>{ applyLang(); renderHome(); });
</script>
</body>
</html>
