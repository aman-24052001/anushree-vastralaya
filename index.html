<!-- ── PAGE: HOME ─────────────────────────────────────────────────────── -->
<main class="page active" id="page-home">
  <div id="home-content"></div>
</main>

<!-- ── PAGE: CUSTOMERS ───────────────────────────────────────────────── -->
<main class="page" id="page-customers">
  <div class="page-body">
    <div class="ac-row">
      <div class="ac-inputs">
        <input id="nc-name"  type="text" placeholder="नाम"/>
        <input id="nc-phone" type="tel"  placeholder="फोन"/>
      </div>
      <button class="ac-add-btn" id="ac-add-btn" onclick="addCustomer()">जोड़ें</button>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="search" type="text" oninput="renderCustomers()" placeholder="खोजें..."/>
    </div>
    <div id="cust-list"></div>
  </div>
</main>

<!-- ── PAGE: ADD SALE ─────────────────────────────────────────────────── -->
<main class="page" id="page-add">
  <div class="page-body" style="padding-top:16px">
    <div class="f-group">
      <label class="f-label" id="lbl-sel-cust">ग्राहक चुनें</label>
      <div class="cust-select-input-wrap">
        <input class="f-input" id="sc-input" type="text"
          placeholder="नाम लिखें..." autocomplete="off"
          oninput="filterSaleDrop()" onfocus="openSaleDrop()"/>
      </div>
      <input type="hidden" id="sc-id"/>
      <div class="drop-list" id="sale-drop"></div>
    </div>

    <div class="f-group">
      <label class="f-label" id="lbl-amt">राशि (₹)</label>
      <input class="f-input amount" id="s-amt" type="number" inputmode="decimal" placeholder="0"/>
    </div>

    <div class="f-group">
      <label class="f-label" id="lbl-desc">विवरण</label>
      <input class="f-input" id="s-desc" type="text" placeholder="जैसे: लाल बनारसी साड़ी"/>
    </div>

    <div class="f-group">
      <label class="f-label" id="lbl-ph">फ़ोटो</label>
      <input type="file" id="ph-file" accept="image/*" capture="environment"
        style="display:none" onchange="handleSalePhoto(event)"/>
      <button class="photo-upload-btn" onclick="document.getElementById('ph-file').click()">
        <span id="lbl-take">📷  फ़ोटो लें</span>
      </button>
      <img class="photo-preview-img" id="ph-prev"/>
    </div>

    <button class="submit-btn" id="save-sale-btn" onclick="saveSale()">बिक्री दर्ज करें</button>
  </div>
</main>

<!-- ── PAGE: ADD PAYMENT ──────────────────────────────────────────────── -->
<main class="page" id="page-pay">
  <div class="page-body" style="padding-top:16px">
    <div class="f-group">
      <label class="f-label" id="lbl-pay-cust">ग्राहक चुनें</label>
      <input class="f-input" id="pc-input" type="text"
        placeholder="नाम लिखें..." autocomplete="off"
        oninput="filterPayDrop()" onfocus="openPayDrop()"/>
      <input type="hidden" id="pc-id"/>
      <div class="drop-list" id="pay-drop"></div>
    </div>

    <div class="bal-strip" id="pay-bal-strip"></div>

    <div class="f-group">
      <label class="f-label" id="lbl-pay-amt">भुगतान राशि (₹)</label>
      <input class="f-input amount" id="p-amt" type="number" inputmode="decimal" placeholder="0"/>
    </div>

    <div class="f-group">
      <label class="f-label" id="lbl-pay-note">नोट</label>
      <input class="f-input" id="p-note" type="text" placeholder="जैसे: कैश मिला"/>
    </div>

    <button class="submit-btn success-btn" id="save-pay-btn" onclick="savePayment()">भुगतान दर्ज करें</button>
  </div>
</main>

    </div>
    <div class="f-group">
      <label class="f-label">विवरण</label>
      <input class="f-input" id="e-desc" type="text"/>
    </div>

      <label class="f-label">तारीख</label>

      <label class="f-label">फ़ोटो बदलें</label>

        style="display:none" onchange="handleEditPhoto(event)"/>
