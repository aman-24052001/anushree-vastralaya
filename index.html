<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#8B0038"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>अनुश्री वस्त्रालय</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700&family=Noto+Sans:wght@400;500;600;700&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;overflow-x:hidden}
:root{
  --maroon:#8B0038;--maroon2:#6D0029;--maroon-light:#F8E8EE;
  --gold:#B8860B;--gold2:#D4A017;--gold-light:#FDF6DC;
  --cream:#FFFDF7;--white:#FFFFFF;
  --text:#1A1A1A;--muted:#777;--border:#E8D9C4;
  --green:#1B6B3A;--green-light:#E6F4EC;
  --red:#B71C1C;--red-light:#FDECEA;
  --card-shadow:0 2px 14px rgba(139,0,56,0.08);
}
body{background:var(--cream);font-family:'Noto Sans',sans-serif;color:var(--text);min-height:100vh;max-width:430px;margin:0 auto;position:relative}
button{font-family:'Noto Sans',sans-serif;cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:'Noto Sans',sans-serif;outline:none;border-radius:0}

/* ── TOPBAR ── */
.topbar{
  background:var(--maroon);
  padding:0 16px;
  height:60px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  border-bottom:3px solid var(--gold);
}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-logo{width:40px;height:40px;border-radius:50%;border:2px solid var(--gold);object-fit:cover;background:var(--maroon-light);flex-shrink:0}
.topbar-text{}
.topbar-title{font-family:'Noto Sans Devanagari',sans-serif;font-size:16px;font-weight:700;color:var(--white);line-height:1.1}
.topbar-sub{font-size:9px;color:rgba(212,160,23,0.9);letter-spacing:1.5px;text-transform:uppercase;font-weight:600}
.lang-btn{background:rgba(212,160,23,0.2);color:var(--gold2);border:1.5px solid rgba(212,160,23,0.5);padding:5px 11px;font-size:11px;font-weight:700;letter-spacing:1px;border-radius:4px}

/* ── PAGES ── */
.page{display:none;padding:14px 14px 82px;min-height:calc(100vh - 60px)}
.page.active{display:block}

/* ── BOTTOM NAV ── */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:var(--white);
  border-top:3px solid var(--maroon);
  display:flex;z-index:100;
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:8px 4px 10px;gap:3px;
  background:none;color:var(--muted);
  font-size:10px;font-weight:700;letter-spacing:0.3px;
  border-right:1px solid #eee;
  transition:background 0.15s,color 0.15s;
}
.nav-btn:last-child{border-right:none}
.nav-btn.active{background:var(--maroon-light);color:var(--maroon)}
.nav-btn .ni{font-size:20px;line-height:1}

/* ── DASHBOARD STATS ── */
.stat-hero{
  background:var(--maroon);
  border-radius:12px;
  padding:18px 20px;
  margin-bottom:12px;
  position:relative;
  overflow:hidden;
}
.stat-hero::after{
  content:'₹';
  position:absolute;right:16px;top:50%;transform:translateY(-50%);
  font-size:72px;font-weight:900;color:rgba(255,255,255,0.06);
  font-family:'Roboto Mono',monospace;
  line-height:1;
}
.stat-hero-label{font-size:11px;color:rgba(255,255,255,0.65);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.stat-hero-val{font-family:'Roboto Mono',monospace;font-size:38px;font-weight:700;color:white;line-height:1}
.stat-hero-sub{font-size:12px;color:rgba(255,255,255,0.55);margin-top:4px}

.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-mini{background:var(--white);border-radius:10px;padding:14px;box-shadow:var(--card-shadow);border-left:3px solid var(--gold)}
.stat-mini.green-border{border-left-color:var(--green)}
.stat-mini-label{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:4px}
.stat-mini-val{font-family:'Roboto Mono',monospace;font-size:18px;font-weight:700;color:var(--text)}
.stat-mini-val.gold{color:var(--gold)}
.stat-mini-val.green{color:var(--green)}

/* ── CHART ── */
.chart-box{background:var(--white);border-radius:12px;padding:16px;box-shadow:var(--card-shadow);margin-bottom:12px}
.chart-box-title{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.chart-wrap{display:flex;align-items:flex-end;gap:5px;height:90px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%}
.bar-body{width:100%;border-radius:3px 3px 0 0;position:relative;min-height:3px;background:var(--maroon-light);transition:height 0.5s ease}
.bar-body.now{background:var(--maroon)}
.bar-val{font-size:7px;font-family:'Roboto Mono',monospace;color:var(--maroon);font-weight:700;position:absolute;top:-14px;left:50%;transform:translateX(-50%);white-space:nowrap}
.bar-lbl{font-size:9px;color:var(--muted);font-weight:600}

/* ── PIE CHART ── */
.pie-box{background:var(--white);border-radius:12px;padding:16px;box-shadow:var(--card-shadow);margin-bottom:12px}
.pie-box-title{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:14px}
.pie-wrap{display:flex;align-items:center;gap:16px}
.pie-svg{flex-shrink:0}
.pie-legend{flex:1}
.pie-legend-item{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.pie-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.pie-legend-label{font-size:12px;color:var(--text);font-weight:600}
.pie-legend-val{font-family:'Roboto Mono',monospace;font-size:12px;color:var(--muted);margin-left:auto}

/* ── SECTION ── */
.section-head{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin:14px 0 8px;display:flex;justify-content:space-between;align-items:center}

/* ── CUSTOMER CARD ── */
.cust-card{
  background:var(--white);border-radius:12px;
  padding:13px 14px;margin-bottom:9px;
  box-shadow:var(--card-shadow);
  display:flex;align-items:center;gap:12px;
  border-left:3px solid transparent;
  cursor:pointer;transition:border-color 0.15s;
}
.cust-card.has-due{border-left-color:var(--red)}
.cust-card.all-clear{border-left-color:var(--green)}
.avatar{
  width:46px;height:46px;border-radius:50%;
  border:2px solid var(--gold);
  background:var(--maroon-light);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;color:var(--maroon);
  overflow:hidden;flex-shrink:0;
  font-family:'Noto Sans Devanagari',sans-serif;
}
.avatar img{width:100%;height:100%;object-fit:cover}
.cust-info{flex:1;min-width:0}
.cust-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cust-bal{font-family:'Roboto Mono',monospace;font-size:13px;font-weight:700;margin-top:2px}
.cust-bal.owing{color:var(--red)}
.cust-bal.clear{color:var(--green)}
.cust-phone{font-size:11px;color:var(--muted);margin-top:1px}
.call-pill{
  background:var(--green);color:white;
  width:42px;height:42px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
  box-shadow:0 2px 8px rgba(27,107,58,0.4);
  text-decoration:none;transition:transform 0.15s;
}
.call-pill:active{transform:scale(0.9)}

/* ── SEARCH ── */
.search-bar{
  width:100%;padding:12px 14px 12px 40px;
  border:1.5px solid var(--border);border-radius:10px;
  font-size:14px;background:var(--white);color:var(--text);
  margin-bottom:12px;
}
.search-bar:focus{border-color:var(--maroon)}
.search-wrap{position:relative}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none}

/* ── ADD CUSTOMER ── */
.add-cust-row{display:flex;gap:8px;margin-bottom:12px;align-items:stretch}
.add-cust-row input{
  flex:1;padding:11px 12px;
  border:1.5px solid var(--border);border-radius:8px;
  font-size:13px;background:var(--white);
  min-width:0;
}
.add-cust-row input:focus{border-color:var(--maroon)}
.add-cust-btn{
  background:var(--maroon);color:white;
  padding:11px 14px;border-radius:8px;
  font-size:12px;font-weight:700;white-space:nowrap;flex-shrink:0;
}

/* ── FORM ── */
.form-section{background:var(--white);border-radius:12px;padding:16px;box-shadow:var(--card-shadow);margin-bottom:12px}
.form-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;display:block;margin-bottom:6px}
.form-input{
  width:100%;padding:12px 14px;
  border:1.5px solid var(--border);border-radius:8px;
  font-size:15px;color:var(--text);background:var(--cream);
  margin-bottom:14px;display:block;
}
.form-input:focus{border-color:var(--maroon);background:var(--white)}
.form-input.amount-input{
  font-family:'Roboto Mono',monospace;font-size:28px;font-weight:700;
  color:var(--maroon);text-align:center;padding:14px;
}
.cust-selector{
  width:100%;padding:12px 14px;
  border:1.5px solid var(--border);border-radius:8px;
  font-size:14px;color:var(--text);background:var(--cream);
  margin-bottom:14px;display:block;cursor:pointer;
}
.cust-selector:focus{border-color:var(--maroon)}
.photo-btn-wrap{
  width:100%;padding:14px;
  border:2px dashed var(--border);border-radius:10px;
  background:var(--cream);color:var(--maroon);
  font-size:14px;font-weight:600;
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-bottom:14px;
}
.photo-preview{width:100%;height:150px;object-fit:cover;border-radius:10px;margin-bottom:14px;display:none}
.submit-btn{
  width:100%;padding:15px;
  background:var(--maroon);color:white;border-radius:10px;
  font-size:16px;font-weight:700;letter-spacing:0.3px;
  box-shadow:0 4px 14px rgba(139,0,56,0.3);
  transition:transform 0.15s;
}
.submit-btn:active{transform:scale(0.97)}

/* ── DROPDOWN ── */
.drop-list{
  background:var(--white);border-radius:10px;
  box-shadow:0 4px 20px rgba(0,0,0,0.12);
  margin-bottom:12px;overflow:hidden;
  display:none;border:1.5px solid var(--border);
  max-height:220px;overflow-y:auto;
}
.drop-list.open{display:block}
.drop-item{
  padding:12px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;cursor:pointer;
  font-size:14px;font-weight:600;
}
.drop-item:last-child{border-bottom:none}
.drop-item:active{background:var(--maroon-light)}
.drop-avatar{width:30px;height:30px;border-radius:50%;background:var(--maroon-light);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--maroon);overflow:hidden;flex-shrink:0}
.drop-avatar img{width:100%;height:100%;object-fit:cover}
.drop-phone{color:var(--muted);font-size:11px;margin-left:auto}

/* ── DETAIL OVERLAY ── */
.overlay{
  position:fixed;inset:0;background:var(--white);z-index:200;
  transform:translateX(100%);transition:transform 0.25s ease;
  overflow-y:auto;overflow-x:hidden;
}
.overlay.open{transform:translateX(0)}
.overlay-head{
  background:var(--maroon);padding:14px 16px;
  display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:10;border-bottom:3px solid var(--gold);
}
.back-btn{
  background:rgba(255,255,255,0.15);color:white;
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;
}
.overlay-name{font-size:17px;font-weight:700;color:white;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.overlay-call{
  background:var(--green);color:white;
  padding:7px 14px;border-radius:20px;
  font-size:12px;font-weight:700;
  display:flex;align-items:center;gap:5px;
  text-decoration:none;flex-shrink:0;
}
.overlay-body{padding:14px 14px 80px}

.bal-hero{
  border-radius:12px;padding:18px 20px;margin-bottom:14px;text-align:center;
}
.bal-hero.owing{background:var(--red-light)}
.bal-hero.clear{background:var(--green-light)}
.bal-hero-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.bal-hero-amount{font-family:'Roboto Mono',monospace;font-size:34px;font-weight:700}
.bal-hero-amount.owing{color:var(--red)}
.bal-hero-amount.clear{color:var(--green);font-size:22px}

.pay-row{
  background:var(--gold-light);border:1.5px solid var(--gold2);border-radius:10px;
  padding:12px 14px;margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.pay-row input{
  flex:1;background:var(--white);border:1.5px solid var(--border);
  border-radius:8px;padding:10px 12px;
  font-size:16px;font-family:'Roboto Mono',monospace;font-weight:700;color:var(--text);
  min-width:0;
}
.pay-row input:focus{border-color:var(--green)}
.pay-submit{
  background:var(--green);color:white;
  padding:10px 16px;border-radius:8px;
  font-size:13px;font-weight:700;white-space:nowrap;flex-shrink:0;
}

/* ── TRANSACTIONS ── */
.txn{background:var(--white);border-radius:10px;padding:13px 14px;margin-bottom:8px;box-shadow:0 1px 6px rgba(0,0,0,0.05)}
.txn-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.txn-tag{font-size:10px;font-weight:700;letter-spacing:0.5px;padding:3px 9px;border-radius:20px}
.txn-tag.sale{background:var(--red-light);color:var(--red)}
.txn-tag.payment{background:var(--green-light);color:var(--green)}
.txn-amt{font-family:'Roboto Mono',monospace;font-size:16px;font-weight:700}
.txn-amt.sale{color:var(--red)}
.txn-amt.payment{color:var(--green)}
.txn-desc{font-size:13px;color:var(--text);margin-bottom:3px}
.txn-date{font-size:11px;color:var(--muted)}
.txn-img{width:100%;max-height:130px;object-fit:cover;border-radius:8px;margin-top:8px;cursor:pointer}

/* ── PHOTO VIEWER ── */
.pv{position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:500;display:none;align-items:center;justify-content:center}
.pv.open{display:flex}
.pv img{max-width:96%;max-height:88vh;border-radius:8px}
.pv-close{position:absolute;top:14px;right:14px;color:white;font-size:24px;background:rgba(255,255,255,0.15);width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:76px;left:50%;transform:translateX(-50%);
  background:var(--text);color:white;
  padding:11px 20px;border-radius:8px;
  font-size:13px;font-weight:600;z-index:999;
  opacity:0;transition:opacity 0.25s;pointer-events:none;
  white-space:nowrap;border-left:3px solid var(--gold2);
}
.toast.show{opacity:1}

/* ── EMPTY ── */
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:44px;margin-bottom:10px}
.empty-text{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px}
.empty-sub{font-size:13px}
</style>
</head>

<!-- PAGES -->
<div class="page active" id="page-home">
  <div id="home-content"></div>
</div>

<div class="page" id="page-customers">
  <div class="add-cust-row">
    <input id="nc-name" type="text" placeholder="नाम / Name"/>
    <input id="nc-phone" type="tel" placeholder="फोन"/>
    <button class="add-cust-btn" onclick="addCustomer()" id="add-cust-btn">+ जोड़ें</button>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-bar" id="search" type="text" oninput="renderCustomers()" placeholder="खोजें..."/>
  </div>
  <div id="cust-list"></div>
</div>

<div class="page" id="page-add">
  <div class="form-section">
    <label class="form-label" id="lbl-cust">ग्राहक / Customer</label>
    <input class="form-input" id="sale-cust-input" type="text"
      placeholder="नाम लिखें..." autocomplete="off"
      oninput="filterDrop()" onfocus="openDrop()"/>
    <input type="hidden" id="sale-cust-id"/>
    <div class="drop-list" id="drop-list"></div>

    <label class="form-label" id="lbl-amt">राशि / Amount (₹)</label>
    <input class="form-input amount-input" id="sale-amt" type="number" inputmode="decimal" placeholder="0"/>

    <label class="form-label" id="lbl-desc">विवरण / Description</label>
    <input class="form-input" id="sale-desc" type="text" placeholder="जैसे: लाल बनारसी साड़ी"/>

    <label class="form-label" id="lbl-photo">फ़ोटो / Photo</label>
    <input type="file" id="photo-file" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(event)"/>
    <button class="photo-btn-wrap" onclick="document.getElementById('photo-file').click()">
      <span>📷</span><span id="lbl-take">फ़ोटो लें / Take Photo</span>
    </button>
    <img class="photo-preview" id="photo-prev"/>

    <button class="submit-btn" onclick="saveSale()" id="save-btn">बिक्री दर्ज करें / Add Sale</button>
  </div>
</div>

    photoLabel:'Photo', takePhoto:'📷 Take Photo',
    saveBtn:'Add Sale',
    balance:'Balance Due', allClear:'All Clear ✓',
    addPay:'Add Payment', payPH:'Amount',
    call:'Call', sale:'Sale', payment:'Payment',
    noTxn:'No transactions yet.',
    t_saved:'✓ Sale recorded', t_paid:'✓ Payment recorded',
    t_added:'✓ Customer added', t_fill:'Please fill customer and amount',
    t_fillCust:'Please fill name and phone',
    noSales:'No sales yet',
  }
};
const t = k => L[lang][k]||k;

function toggleLang(){
  lang = lang==='hi'?'en':'hi';
  localStorage.setItem('av_lang',lang);
  document.getElementById('lang-btn').textContent = lang==='hi'?'EN':'HI';

// ── INDEXEDDB ─────────────────────────────────────────────────────────────────
let db, customers=[], transactions=[], currentCustId=null, photoData=null;

function initDB(){
  return new Promise((res,rej)=>{
    const r = indexedDB.open('anushreeVastralaya',1);
    r.onupgradeneeded = e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('customers')) d.createObjectStore('customers',{keyPath:'id'});
      if(!d.objectStoreNames.contains('transactions')) d.createObjectStore('transactions',{keyPath:'id'});
    };
    r.onsuccess = e=>{ db=e.target.result; res(); };
    r.onerror = ()=>rej(r.error);
  });
}
const dbAll = s => new Promise(res=>{ const r=db.transaction(s,'readonly').objectStore(s).getAll(); r.onsuccess=()=>res(r.result||[]); });
const dbPut = (s,o) => new Promise(res=>{ const tx=db.transaction(s,'readwrite'); tx.objectStore(s).put(o); tx.oncomplete=res; });

// ── HELPERS ───────────────────────────────────────────────────────────────────
const uid = ()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const fmt = n=>'₹'+Number(n||0).toLocaleString('en-IN');
const fmtDate = iso=>{ const d=new Date(iso); return d.getDate()+' '+t('months')[d.getMonth()]+' '+d.getFullYear(); };
const initial = n=>n?n.charAt(0).toUpperCase():'?';
const balance = id=>transactions.filter(x=>x.customerId===id).reduce((s,x)=>x.type==='sale'?s+x.amount:s-x.amount,0);

function toast(msg,dur=2000){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),dur);
}

async function loadData(){ customers=await dbAll('customers'); transactions=await dbAll('transactions'); }

// ── NAV ───────────────────────────────────────────────────────────────────────
let curTab='home';
function goTo(tab){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  document.getElementById('nav-'+tab).classList.add('active');
  curTab=tab;
  if(tab==='home') renderHome();
  if(tab==='customers') renderCustomers();
  if(tab==='add'){ resetForm(); buildDrop(); }
}

// ── HOME ─────────────────────────────────────────────────────────────────────
function renderHome(){
  const now=new Date(), m=now.getMonth(), y=now.getFullYear();
  const totalDue = customers.reduce((s,c)=>s+Math.max(0,balance(c.id)),0);
  const monthTx  = transactions.filter(tx=>{ const d=new Date(tx.date); return d.getMonth()===m&&d.getFullYear()===y; });
  const monthSale= monthTx.filter(x=>x.type==='sale').reduce((s,x)=>s+x.amount,0);
  const monthPaid= monthTx.filter(x=>x.type==='payment').reduce((s,x)=>s+x.amount,0);
  const allSales = transactions.filter(x=>x.type==='sale').reduce((s,x)=>s+x.amount,0);

  // Bar chart — last 6 months
  const bars=[];
  for(let i=5;i>=0;i--){
    const d=new Date(y,m-i,1),bm=d.getMonth(),by=d.getFullYear();
    const v=transactions.filter(x=>{ const dd=new Date(x.date); return x.type==='sale'&&dd.getMonth()===bm&&dd.getFullYear()===by; }).reduce((s,x)=>s+x.amount,0);
    bars.push({label:t('months')[bm],v,now:i===0});
  }
  const maxBar=Math.max(...bars.map(b=>b.v),1);

  // Pie — this month collected vs owing
  const pieCollected=monthPaid;
  const pieOwing=Math.max(0,monthSale-monthPaid);
  const pieTotal=pieCollected+pieOwing||1;
  const pieCollectedPct=Math.round((pieCollected/pieTotal)*100);
  const pieOwingPct=100-pieCollectedPct;
  // SVG pie
  function polarToXY(cx,cy,r,deg){ const rad=(deg-90)*Math.PI/180; return {x:cx+r*Math.cos(rad),y:cy+r*Math.sin(rad)}; }
  function pieSlice(cx,cy,r,start,end,color){
    if(end-start>=360) return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${color}"/>`;
    const s=polarToXY(cx,cy,r,start),e=polarToXY(cx,cy,r,end);
    const large=end-start>180?1:0;
    return `<path d="M${cx},${cy} L${s.x},${s.y} A${r},${r} 0 ${large},1 ${e.x},${e.y} Z" fill="${color}"/>`;
  }
  const p1=pieCollectedPct*3.6, p2=360;
  const pieHTML=monthSale>0?`
    <svg class="pie-svg" width="90" height="90" viewBox="0 0 90 90">
      <circle cx="45" cy="45" r="40" fill="#eee"/>
      ${pieSlice(45,45,40,0,p1,'#1B6B3A')}
      ${p1<360?pieSlice(45,45,40,p1,360,'#B71C1C'):''}
      <circle cx="45" cy="45" r="24" fill="white"/>
      <text x="45" y="48" text-anchor="middle" font-size="11" font-weight="700" font-family="Roboto Mono,monospace" fill="#1A1A1A">${pieCollectedPct}%</text>
    </svg>`:'<div style="width:90px;height:90px;background:#f5f5f5;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;color:#aaa">No data</div>';

  // Top debtors
  const debtors=customers.map(c=>({...c,bal:balance(c.id)})).filter(c=>c.bal>0).sort((a,b)=>b.bal-a.bal).slice(0,3);

  // Recent 4 sales
  const recent=[...transactions].filter(x=>x.type==='sale').sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,4);

  document.getElementById('home-content').innerHTML=`
    <!-- HERO STAT -->
    <div class="stat-hero">
      <div class="stat-hero-label">${t('totalDue')}</div>
      <div class="stat-hero-val">${fmt(totalDue)}</div>
      <div class="stat-hero-sub">${t('subDue')}</div>
    </div>

    <!-- MINI STATS -->
    <div class="stats-row">
      <div class="stat-mini">
        <div class="stat-mini-label">${t('monthSale')}</div>
        <div class="stat-mini-val gold">${fmt(monthSale)}</div>
      </div>
      <div class="stat-mini green-border">
        <div class="stat-mini-label">${t('allTime')}</div>
        <div class="stat-mini-val green">${fmt(allSales)}</div>
      </div>
    </div>

    <!-- BAR CHART -->
    <div class="chart-box">
      <div class="chart-box-title">
        <span>${t('chartTitle')}</span>
        <span style="color:var(--maroon);font-family:'Roboto Mono',monospace;font-size:12px">${fmt(monthSale)}</span>
      </div>
      ${bars.every(b=>b.v===0)?
        `<div style="text-align:center;padding:24px;color:var(--muted);font-size:13px">${t('noSales')}</div>`:`
      <div class="chart-wrap">
        ${bars.map(b=>`
          <div class="bar-col">
            <div style="flex:1;display:flex;align-items:flex-end;width:100%">
              <div class="bar-body ${b.now?'now':''}" style="height:${Math.max(3,(b.v/maxBar)*84)}px;width:100%">
                ${b.v>0?`<span class="bar-val">${b.v>=1000?(b.v/1000).toFixed(0)+'k':b.v}</span>`:''}
              </div>
            </div>
            <div class="bar-lbl">${b.label}</div>
          </div>
        `).join('')}
      </div>`}
    </div>

    <!-- PIE CHART -->
    ${monthSale>0?`
    <div class="pie-box">
      <div class="pie-box-title">${t('pieTitle')}</div>
      <div class="pie-wrap">
        ${pieHTML}
        <div class="pie-legend">
          <div class="pie-legend-item">
            <div class="pie-dot" style="background:var(--green)"></div>
            <div class="pie-legend-label">${t('collected')}</div>
            <div class="pie-legend-val">${fmt(pieCollected)}</div>
          </div>
          <div class="pie-legend-item">
            <div class="pie-dot" style="background:var(--red)"></div>
            <div class="pie-legend-label">${t('owing')}</div>
            <div class="pie-legend-val">${fmt(pieOwing)}</div>
          </div>
        </div>
      </div>
    </div>`:''}

    ${debtors.length>0?`
    <div class="section-head">${t('topBorrowers')}</div>
    ${debtors.map(c=>`
      <div class="cust-card has-due" onclick="openDetail('${c.id}')">
        <div class="avatar">${c.photo?`<img src="${c.photo}"/>`:initial(c.name)}</div>
        <div class="cust-info">
          <div class="cust-name">${c.name}</div>
          <div class="cust-bal owing">${fmt(c.bal)} ${t('owing')}</div>
          <div class="cust-phone">${c.phone}</div>
        </div>
        <a class="call-pill" href="tel:${c.phone}" onclick="event.stopPropagation()">📞</a>
      </div>
    `).join('')}`:''}

    ${recent.length>0?`
    <div class="section-head">${t('recentSales')}</div>
    ${recent.map(tx=>{
      const c=customers.find(x=>x.id===tx.customerId);
      return `
      <div class="txn" onclick="c&&openDetail('${tx.customerId}')">
        <div class="txn-top">
          <div style="font-size:13px;font-weight:700">${c?c.name:'—'}</div>
          <div class="txn-amt sale">${fmt(tx.amount)}</div>
        </div>
        ${tx.desc?`<div class="txn-desc">${tx.desc}</div>`:''}
        <div class="txn-date">${fmtDate(tx.date)}</div>
        ${tx.photo?`<img class="txn-img" src="${tx.photo}" onclick="event.stopPropagation();openPV('${tx.photo}')"/>`:''}
      </div>`;
    }).join('')}`:''}
  `;
}

// ── CUSTOMERS ─────────────────────────────────────────────────────────────────
async function addCustomer(){
  const name=document.getElementById('nc-name').value.trim();
  const phone=document.getElementById('nc-phone').value.trim();
  if(!name||!phone){ toast(t('t_fillCust')); return; }
  const c={id:uid(),name,phone,photo:null,createdAt:new Date().toISOString()};
  await dbPut('customers',c); customers.push(c);
  document.getElementById('nc-name').value='';
  document.getElementById('nc-phone').value='';
  toast(t('t_added')); renderCustomers();
}

function renderCustomers(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  const filtered=customers
    .filter(c=>c.name.toLowerCase().includes(q)||c.phone.includes(q))
    .map(c=>({...c,bal:balance(c.id)}))
    .sort((a,b)=>b.bal-a.bal);

  if(!filtered.length){
    document.getElementById('cust-list').innerHTML=
      `<div class="empty"><div class="empty-icon">🪷</div><div class="empty-text">${t('noCustomers')}</div><div class="empty-sub">${t('noCustomersSub')}</div></div>`;
    return;
  }
  document.getElementById('cust-list').innerHTML=filtered.map(c=>`
    <div class="cust-card ${c.bal>0?'has-due':'all-clear'}" onclick="openDetail('${c.id}')">
      <div class="avatar">${c.photo?`<img src="${c.photo}"/>`:initial(c.name)}</div>
      <div class="cust-info">
        <div class="cust-name">${c.name}</div>
        <div class="cust-bal ${c.bal>0?'owing':'clear'}">${c.bal>0?fmt(c.bal)+' '+t('owing'):t('allClear')}</div>
        <div class="cust-phone">${c.phone}</div>
      </div>
      <a class="call-pill" href="tel:${c.phone}" onclick="event.stopPropagation()">📞</a>
    </div>
  `).join('');
}

// ── ADD SALE ──────────────────────────────────────────────────────────────────
function buildDrop(){
  const q=(document.getElementById('sale-cust-input').value||'').toLowerCase();
  const list=customers.filter(c=>!q||c.name.toLowerCase().includes(q)||c.phone.includes(q));
  const dd=document.getElementById('drop-list');
  if(!list.length){ dd.classList.remove('open'); return; }
  dd.innerHTML=list.map(c=>`
    <div class="drop-item" onclick="pickCust('${c.id}','${c.name}')">
      <div class="drop-avatar">${c.photo?`<img src="${c.photo}"/>`:initial(c.name)}</div>
      <span>${c.name}</span><span class="drop-phone">${c.phone}</span>
    </div>
  `).join('');
  dd.classList.add('open');
}
function openDrop(){ buildDrop(); }
function filterDrop(){ document.getElementById('sale-cust-id').value=''; buildDrop(); }
function pickCust(id,name){
  document.getElementById('sale-cust-id').value=id;
  document.getElementById('sale-cust-input').value=name;
  document.getElementById('drop-list').classList.remove('open');
}
document.addEventListener('click',e=>{
  const dd=document.getElementById('drop-list');
  if(!dd.contains(e.target)&&e.target.id!=='sale-cust-input') dd.classList.remove('open');
});

function handlePhoto(e){
  const file=e.target.files[0]; if(!file) return;
  // Compress before storing
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const max=800; let w=img.width,h=img.height;
      if(w>max){h=Math.round(h*max/w);w=max;}
      if(h>max){w=Math.round(w*max/h);h=max;}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      photoData=canvas.toDataURL('image/jpeg',0.7);
      const prev=document.getElementById('photo-prev');
      prev.src=photoData; prev.style.display='block';
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

function resetForm(){
  ['sale-cust-input','sale-amt','sale-desc'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('sale-cust-id').value='';
  document.getElementById('photo-prev').style.display='none';
  document.getElementById('photo-file').value='';
  document.getElementById('drop-list').classList.remove('open');
  photoData=null;
}

async function saveSale(){
  const custId=document.getElementById('sale-cust-id').value;
  const amt=parseFloat(document.getElementById('sale-amt').value);
  const desc=document.getElementById('sale-desc').value.trim();
  if(!custId||!amt||amt<=0){ toast(t('t_fill')); return; }
  const tx={id:uid(),customerId:custId,type:'sale',amount:amt,desc,photo:photoData||null,date:new Date().toISOString()};
  await dbPut('transactions',tx); transactions.push(tx);
  toast(t('t_saved')); resetForm(); goTo('home');
}

// ── DETAIL ────────────────────────────────────────────────────────────────────
function openDetail(id){
  currentCustId=id;
  const c=customers.find(x=>x.id===id); if(!c) return;
  document.getElementById('ov-name').textContent=c.name;
  document.getElementById('ov-call').href='tel:'+c.phone;
  renderDetail();
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeOverlay(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
  currentCustId=null;
  loadData().then(renderAll);
}

async function addPayment(){
  const amt=parseFloat(document.getElementById('pay-input').value);
  if(!amt||amt<=0) return;
  const tx={id:uid(),customerId:currentCustId,type:'payment',amount:amt,desc:'',photo:null,date:new Date().toISOString()};
  await dbPut('transactions',tx); transactions.push(tx);
  document.getElementById('pay-input').value='';
  toast(t('t_paid')); renderDetail();
}

function renderDetail(){
  const id=currentCustId;
  const txns=[...transactions].filter(x=>x.customerId===id).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const bal=balance(id);
  const clear=bal<=0;
  document.getElementById('ov-body').innerHTML=`
    <div class="bal-hero ${clear?'clear':'owing'}">
      <div class="bal-hero-label">${clear?'':t('balance')}</div>
      <div class="bal-hero-amount ${clear?'clear':'owing'}">${clear?t('allClear'):fmt(bal)}</div>
    </div>

    ${!clear?`
    <div class="pay-row">
      <input id="pay-input" type="number" inputmode="decimal" placeholder="${t('payPH')}"/>
      <button class="pay-submit" onclick="addPayment()">✓ ${t('addPay')}</button>
    </div>`:''}

    ${txns.length===0?
      `<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">${t('noTxn')}</div></div>`:
      txns.map(tx=>`
        <div class="txn">
          <div class="txn-top">
            <span class="txn-tag ${tx.type}">${tx.type==='sale'?t('sale'):t('payment')}</span>
            <span class="txn-amt ${tx.type}">${tx.type==='sale'?'+':'-'}${fmt(tx.amount)}</span>
          </div>
          ${tx.desc?`<div class="txn-desc">${tx.desc}</div>`:''}
          <div class="txn-date">${fmtDate(tx.date)}</div>
          ${tx.photo?`<img class="txn-img" src="${tx.photo}" onclick="openPV('${tx.photo}')"/>`:''}
        </div>
      `).join('')
    }
  `;
}

// ── PHOTO VIEWER ──────────────────────────────────────────────────────────────
function openPV(src){ document.getElementById('pv-img').src=src; document.getElementById('pv').classList.add('open'); }
function closePV(){ document.getElementById('pv').classList.remove('open'); document.getElementById('pv-img').src=''; }

// ── BOOT ──────────────────────────────────────────────────────────────────────
function renderAll(){ if(curTab==='home')renderHome(); if(curTab==='customers')renderCustomers(); }

initDB().then(loadData).then(()=>{ applyLang(); renderHome(); });
</script>
