<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#C2185B"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="description" content="अनुश्री वस्त्रालय — डिजिटल बही-खाता"/>
<title>अनुश्री वस्त्रालय</title>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" href="icons/icon-192.png"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<script>
  // Apply saved theme/text-size before first paint — avoids a flash of the wrong theme
  (function () {
    var th = localStorage.getItem('av_theme') || 'default';
    var sz = localStorage.getItem('av_size') || 'md';
    var scale = { sm: 0.92, md: 1, lg: 1.14 }[sz] || 1;
    document.documentElement.setAttribute('data-theme', th);
    document.documentElement.style.setProperty('--text-scale', scale);
  })();
</script>
<link rel="stylesheet" href="css/tokens.css"/>
<link rel="stylesheet" href="css/layout.css"/>
<link rel="stylesheet" href="css/components.css"/>
</head>
<body>

<!-- ── TOPBAR ─────────────────────────────────────────────────────────── -->
<header class="topbar">
  <div class="topbar-row">
    <div class="topbar-logo">
      <img class="topbar-logo-img" src="icons/logo.png" alt="logo"/>
      <div>
        <div class="topbar-name" id="tb-name">अनुश्री वस्त्रालय</div>
        <div class="topbar-tagline" id="tb-sub">साड़ी · टेक्सटाइल्स · परंपरा</div>
      </div>
    </div>
    <div class="topbar-actions">
      <button class="settings-btn" onclick="openSettings()" aria-label="Settings">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
      <button class="lang-pill" id="lang-btn" onclick="toggleLang()">EN</button>
    </div>
  </div>
</header>

<!-- ── PAGE: HOME ─────────────────────────────────────────────────────── -->
<main class="page active" id="page-home">
  <div id="home-content"></div>
</main>

<!-- ── PAGE: CUSTOMERS ───────────────────────────────────────────────── -->
<main class="page" id="page-customers">
  <div class="page-body">
    <div class="ac-row">
      <button class="import-contact-btn" id="import-contact-btn" onclick="importFromContacts()">
        📇 <span id="lbl-import-contact">फ़ोन से चुनें</span>
      </button>
      <div class="ac-inputs">
        <input id="nc-name"  type="text" placeholder="नाम"/>
        <input id="nc-phone" type="tel"  placeholder="फोन"/>
      </div>
      <button class="ac-add-btn" id="ac-add-btn" onclick="addCustomer()">जोड़ें</button>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="search" type="text" oninput="renderCustomers()" placeholder="खोजें..."/>
    </div>
    <div id="cust-list"></div>
  </div>
</main>

<!-- ── PAGE: ADD SALE ─────────────────────────────────────────────────── -->
<main class="page" id="page-add">
  <div class="page-body" style="padding-top:16px">
    <div id="sale-recent"></div>
    <div class="f-group">
      <label class="f-label" id="lbl-sel-cust">ग्राहक चुनें</label>
      <div class="cust-select-input-wrap">
        <input class="f-input" id="sc-input" type="text"
          placeholder="नाम लिखें..." autocomplete="off"
          oninput="filterSaleDrop()" onfocus="openSaleDrop()"/>
      </div>
      <input type="hidden" id="sc-id"/>
      <div class="drop-list" id="sale-drop"></div>
    </div>

    <div id="sale-items-list"></div>
    <button class="add-item-btn" id="add-item-btn" onclick="addSaleItemRow()">
      + <span id="lbl-add-item">और सामान जोड़ें</span>
    </button>

    <div class="sale-total-row">
      <span id="lbl-total">कुल राशि</span>
      <span class="sale-total-amt" id="sale-total-amt">₹0</span>
    </div>

    <button class="submit-btn" id="save-sale-btn" onclick="saveSale()">बिक्री दर्ज करें</button>
  </div>
</main>

<!-- ── PAGE: ADD PAYMENT ──────────────────────────────────────────────── -->
<main class="page" id="page-pay">
  <div class="page-body" style="padding-top:16px">
    <div id="pay-recent"></div>
    <div class="f-group">
      <label class="f-label" id="lbl-pay-cust">ग्राहक चुनें</label>
      <input class="f-input" id="pc-input" type="text"
        placeholder="नाम लिखें..." autocomplete="off"
        oninput="filterPayDrop()" onfocus="openPayDrop()"/>
      <input type="hidden" id="pc-id"/>
      <div class="drop-list" id="pay-drop"></div>
    </div>

    <div class="bal-strip" id="pay-bal-strip"></div>

    <div class="f-group">
      <label class="f-label" id="lbl-pay-amt">भुगतान राशि (₹)</label>
      <input class="f-input amount" id="p-amt" type="number" inputmode="decimal" placeholder="0"/>
    </div>
    <div class="amt-preview" id="p-amt-preview"></div>

    <div class="f-group">
      <label class="f-label" id="lbl-pay-method">भुगतान का तरीका</label>
      <div class="method-toggle">
        <div class="method-opt active" id="p-method-cash" onclick="setPayMethod('cash')">
          <span>💵</span> <span id="lbl-method-cash">नकद</span>
        </div>
        <div class="method-opt" id="p-method-upi" onclick="setPayMethod('upi')">
          <span>📱</span> <span id="lbl-method-upi">यूपीआई</span>
        </div>
      </div>
    </div>

    <div class="qr-card" id="p-qr-card" style="display:none">
      <img src="assets/upi-qr.png" alt="UPI QR"/>
      <div class="qr-hint" id="lbl-qr-hint">ग्राहक को यह दिखाएँ — वह स्कैन करके भुगतान करेगा</div>
    </div>

    <div class="f-group">
      <label class="f-label" id="lbl-pay-note">नोट</label>
      <input class="f-input" id="p-note" type="text" placeholder="जैसे: कैश मिला"/>
    </div>

    <button class="submit-btn success-btn" id="save-pay-btn" onclick="savePayment()">भुगतान दर्ज करें</button>
  </div>
</main>

<!-- ── BOTTOM NAV ─────────────────────────────────────────────────────── -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-home" onclick="goTo('home')">
    <span class="nav-icon">🏠</span>
    <span id="nl-home">घर</span>
  </button>
  <button class="nav-btn" id="nav-customers" onclick="goTo('customers')">
    <span class="nav-icon">👩‍👩‍👧</span>
    <span id="nl-cust">ग्राहक</span>
  </button>
  <button class="nav-btn nav-primary" id="nav-add" onclick="goTo('add')">
    <div class="nav-icon-wrap">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </div>
    <span id="nl-add">बिक्री</span>
  </button>
  <button class="nav-btn" id="nav-pay" onclick="goTo('pay')">
    <span class="nav-icon">💰</span>
    <span id="nl-pay">भुगतान</span>
  </button>
</nav>

<!-- ── CUSTOMER DETAIL OVERLAY ────────────────────────────────────────── -->
<div class="overlay" id="overlay">
  <div class="ov-header">
    <div class="ov-header-row">
      <button class="ov-back" onclick="closeOverlay()">←</button>
      <div class="ov-title" id="ov-name"></div>
      <a class="ov-call-btn" id="ov-call" href="#">
        📞 <span id="lbl-call">कॉल</span>
      </a>
    </div>
  </div>
  <div class="ov-body" id="ov-body"></div>
</div>

<!-- ── EDIT TXN MODAL ────────────────────────────────────────────────── -->
<div class="modal-bg" id="edit-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">
      <span id="lbl-edit-title">एंट्री सुधारें</span>
      <button class="modal-close" onclick="closeEditModal()">✕</button>
    </div>
    <input type="hidden" id="edit-txn-id"/>
    <div class="f-group">
      <label class="f-label">राशि (₹)</label>
      <input class="f-input amount" id="e-amt" type="number" inputmode="decimal" placeholder="0"/>
    </div>
    <div class="f-group">
      <label class="f-label">विवरण</label>
      <input class="f-input" id="e-desc" type="text"/>
    </div>
    <div class="f-group">
      <label class="f-label">तारीख</label>
      <input class="f-input" id="e-date" type="date"/>
    </div>
    <div class="f-group">
      <label class="f-label">फ़ोटो बदलें</label>
      <input type="file" id="e-ph-file" accept="image/*"
        style="display:none" onchange="handleEditPhoto(event)"/>
      <button class="photo-upload-btn" onclick="openEditCamera()">
        📷  फ़ोटो बदलें
      </button>
      <img class="photo-preview-img" id="e-ph-prev"/>
    </div>
    <button class="submit-btn" onclick="saveEdit()">✓ सुधार सेव करें</button>
  </div>
</div>

<!-- ── IN-APP CAMERA (replaces unreliable native camera intent) ─────────── -->
<div class="cam-overlay" id="cam-overlay">
  <video id="cam-video" autoplay playsinline muted></video>
  <canvas id="cam-canvas" style="display:none"></canvas>
  <img id="cam-preview-img" class="cam-preview-img" alt=""/>
  <button class="cam-close" id="cam-close-btn" onclick="closeCamera()">✕</button>
  <button class="cam-switch" id="cam-switch-btn" onclick="switchCamera()">🔄</button>
  <div class="cam-bar cam-bar-live" id="cam-bar-live">
    <button class="cam-gallery-link" onclick="useCameraGalleryFallback()" id="cam-gallery-link"></button>
    <button class="cam-shutter" id="cam-shutter-btn" onclick="camShutter()" aria-label="Capture"></button>
    <span class="cam-bar-spacer"></span>
  </div>
  <div class="cam-bar cam-bar-preview" id="cam-bar-preview">
    <button class="cam-retake-btn" onclick="camRetake()" aria-label="Retake">✕</button>
    <button class="cam-confirm-btn" onclick="camConfirm()" aria-label="Use photo">✓</button>
  </div>
</div>

<!-- ── PHOTO VIEWER ───────────────────────────────────────────────────── -->
<div class="pv" id="pv" onclick="closePV()">
  <button class="pv-close" onclick="closePV()">✕</button>
  <img id="pv-img" src="" alt=""/>
  <div class="pv-caption" id="pv-caption" onclick="event.stopPropagation()"></div>
</div>

<!-- ── BILL ──────────────────────────────────────────────────────────── -->
<div class="modal-bg" id="bill-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">
      <span id="bill-title">बिल</span>
      <button class="modal-close" onclick="closeBill()">✕</button>
    </div>
    <div class="bill-card" id="bill-body"></div>
    <button class="submit-btn" id="bill-share-btn" onclick="shareBill()">📤 शेयर करें</button>
  </div>
</div>

<!-- ── SETTINGS MODAL ────────────────────────────────────────────────── -->
<div class="modal-bg" id="settings-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">
      <span id="settings-title">सेटिंग्स</span>
      <button class="modal-close" onclick="closeSettings()">✕</button>
    </div>
    <div id="settings-body"></div>
  </div>
</div>
<input type="file" id="backup-file-input" accept="application/json,.json" style="display:none" onchange="handleImportFile(event)"/>

<!-- ── GUIDED TOUR ────────────────────────────────────────────────────── -->
<div class="tour-overlay" id="tour-overlay">
  <button class="tour-skip" id="tour-skip-btn" onclick="skipTour()">Skip</button>
  <div class="tour-content">
    <div class="tour-icon" id="tour-icon"></div>
    <div class="tour-title" id="tour-title"></div>
    <div class="tour-body" id="tour-body"></div>
  </div>
  <div class="tour-dots" id="tour-dots"></div>
  <div class="tour-actions">
    <button class="tour-back-btn" id="tour-back-btn" onclick="prevTourSlide()">Back</button>
    <button class="tour-next-btn" id="tour-next-btn" onclick="nextTourSlide()">Next</button>
  </div>
</div>

<!-- ── TOAST ─────────────────────────────────────────────────────────── -->
<div class="toast" id="toast"></div>

<!-- ── SCRIPTS (order matters) ───────────────────────────────────────── -->
<script src="js/db.js"></script>
<script src="js/i18n.js"></script>
<script src="js/utils.js"></script>
<script src="js/camera.js"></script>
<script src="js/theme.js"></script>
<script src="js/tour.js"></script>
<script src="js/vendor/jspdf.umd.min.js"></script>
<script src="js/backup.js"></script>
<script src="js/bill.js"></script>
<script src="js/home.js"></script>
<script src="js/customers.js"></script>
<script src="js/forms.js"></script>
<script src="js/detail.js"></script>
<script src="js/app.js"></script>

</body>
</html>
